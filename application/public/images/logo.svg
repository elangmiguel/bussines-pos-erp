<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6bc4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6bc4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a9de8;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: stylized cube/box representing ERP -->
  <rect x="4" y="10" width="56" height="56" rx="12" fill="url(#grad1)"/>
  <polygon points="32,18 52,26 52,46 32,54 12,46 12,26" fill="none" stroke="#4a9de8" stroke-width="1.5" opacity="0.6"/>
  <polygon points="32,18 52,26 32,34 12,26" fill="url(#grad2)" opacity="0.8"/>
  <polygon points="32,34 52,26 52,46 32,54" fill="#1a3a6e" opacity="0.9"/>
  <polygon points="32,34 12,26 12,46 32,54" fill="#2558a8" opacity="0.9"/>
  <line x1="32" y1="34" x2="32" y2="54" stroke="#4a9de8" stroke-width="1" opacity="0.5"/>
  <!-- Text: Business CMD -->
  <text x="72" y="36" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="800" fill="url(#grad1)" letter-spacing="-0.5">Business</text>
  <text x="72" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="900" fill="url(#grad2)" letter-spacing="3">CMD</text>
</svg>
